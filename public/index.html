<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bombas Nampula - Monitoramento Colaborativo de Combustivel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .stat-card {
            background: #f7f7f7;
            padding: 15px 25px;
            border-radius: 15px;
            flex: 1;
            min-width: 150px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #667eea;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-filter {
            background: white;
            color: #666;
        }

        .btn-filter.active {
            background: #667eea;
            color: white;
        }

        .fuel-type-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .fuel-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .fuel-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            animation: fadeInUp 0.5s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .station-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .station-location {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .fuel-status {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .fuel-item {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
        }

        .fuel-gasoline {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
        }

        .fuel-diesel {
            background: #e0f2fe;
            border-left: 4px solid #0284c7;
        }

        .status-available {
            color: #16a34a;
        }

        .status-unavailable {
            color: #dc2626;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            padding: 10px 0;
            border-top: 1px solid #f0f0f0;
        }

        .confirmations {
            color: #48bb78;
            font-weight: bold;
        }

        .last-update {
            color: #999;
            font-size: 0.85rem;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-gasoline {
            flex: 1;
            background: #f59e0b;
            color: white;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .btn-diesel {
            flex: 1;
            background: #0284c7;
            color: white;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            color: #999;
        }

        @media (max-width: 768px) {
            .stations-grid {
                grid-template-columns: 1fr;
            }
            
            .card-actions {
                flex-direction: column;
            }
            
            .fuel-status {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bombas Nampula</h1>
            <p class="subtitle">Monitoramento Colaborativo - Saiba onde tem Gasolina ou Diesel</p>
            
            <div class="fuel-type-buttons">
                <button class="fuel-btn active" onclick="selectFuelType('all')" data-fuel="all">Todos</button>
                <button class="fuel-btn" onclick="selectFuelType('gasoline')" data-fuel="gasoline">Gasolina</button>
                <button class="fuel-btn" onclick="selectFuelType('diesel')" data-fuel="diesel">Diesel</button>
            </div>

            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalStations">0</div>
                    <div class="stat-label">Total de Postos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="gasolineStations">0</div>
                    <div class="stat-label">Com Gasolina</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="dieselStations">0</div>
                    <div class="stat-label">Com Diesel</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="openAddModal()">Adicionar Posto</button>
            <button class="btn btn-filter active" onclick="filterStations('all')" data-filter="all">Todos</button>
            <button class="btn btn-filter" onclick="filterStations('available')" data-filter="available">Disponivel</button>
            <button class="btn btn-filter" onclick="filterStations('unavailable')" data-filter="unavailable">Sem Combustivel</button>
        </div>

        <div id="stationsGrid" class="stations-grid">
            <div class="loading">Carregando postos...</div>
        </div>
    </div>

    <!-- Modal Adicionar Bomba -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <h2>Adicionar Novo Posto</h2>
            <form id="addStationForm">
                <div class="form-group">
                    <label>Nome do Posto *</label>
                    <input type="text" id="stationName" required placeholder="Ex: Petromoc Nampula">
                </div>
                <div class="form-group">
                    <label>Localizacao *</label>
                    <input type="text" id="stationLocation" required placeholder="Ex: Centro, Av. Eduardo Mondlane">
                </div>
                <div class="form-group">
                    <label>Gasolina</label>
                    <select id="gasolineStatus">
                        <option value="available">Disponivel</option>
                        <option value="unavailable">Indisponivel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Diesel</label>
                    <select id="dieselStatus">
                        <option value="available">Disponivel</option>
                        <option value="unavailable">Indisponivel</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Adicionar Posto</button>
                    <button type="button" class="btn" onclick="closeAddModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';
        let stations = [];
        let currentFilter = 'all';
        let currentFuelType = 'all';

        async function fetchStations() {
            try {
                const response = await fetch(`${API_URL}/stations`);
                if (!response.ok) throw new Error('Network error');
                stations = await response.json();
                updateStats();
                renderStations();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('stationsGrid').innerHTML = '<div class="empty-state">Erro ao carregar postos.</div>';
            }
        }

        function updateStats() {
            const total = stations.length;
            let gasolineAvailable = 0;
            let dieselAvailable = 0;
            
            stations.forEach(station => {
                if (station.gasoline === 'available') gasolineAvailable++;
                if (station.diesel === 'available') dieselAvailable++;
            });
            
            document.getElementById('totalStations').textContent = total;
            document.getElementById('gasolineStations').textContent = gasolineAvailable;
            document.getElementById('dieselStations').textContent = dieselAvailable;
        }

        function getStatusText(status) {
            const map = {
                'available': 'Disponivel',
                'unavailable': 'Indisponivel'
            };
            return map[status] || 'Indisponivel';
        }

        function getStatusClass(status) {
            const map = {
                'available': 'status-available',
                'unavailable': 'status-unavailable'
            };
            return map[status] || 'status-unavailable';
        }

        function getRelativeTime(timestamp) {
            if (!timestamp) return 'ha pouco';
            const seconds = Math.floor((Date.now() - new Date(timestamp).getTime()) / 1000);
            if (seconds < 60) return `ha ${seconds} segundos`;
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `ha ${minutes} min`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `ha ${hours} h`;
            const days = Math.floor(hours / 24);
            return `ha ${days} dias`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function shouldShowStation(station) {
            if (currentFuelType === 'all') return true;
            if (currentFuelType === 'gasoline') return station.gasoline === 'available';
            if (currentFuelType === 'diesel') return station.diesel === 'available';
            return true;
        }

        function renderStations() {
            const grid = document.getElementById('stationsGrid');
            
            let filteredStations = stations.filter(s => {
                if (currentFilter !== 'all') {
                    return s.status === currentFilter;
                }
                return true;
            });
            
            filteredStations = filteredStations.filter(shouldShowStation);
            
            if (filteredStations.length === 0) {
                grid.innerHTML = '<div class="empty-state">Nenhum posto encontrado.</div>';
                return;
            }
            
            grid.innerHTML = filteredStations.map(station => {
                const gasolineStatus = getStatusText(station.gasoline);
                const dieselStatus = getStatusText(station.diesel);
                const gasolineClass = getStatusClass(station.gasoline);
                const dieselClass = getStatusClass(station.diesel);
                
                return `
                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="station-name">${escapeHtml(station.name)}</div>
                                <div class="station-location">Local: ${escapeHtml(station.location)}</div>
                            </div>
                        </div>
                        
                        <div class="fuel-status">
                            <div class="fuel-item fuel-gasoline">
                                <strong>Gasolina:</strong><br>
                                <span class="${gasolineClass}">${gasolineStatus}</span>
                            </div>
                            <div class="fuel-item fuel-diesel">
                                <strong>Diesel:</strong><br>
                                <span class="${dieselClass}">${dieselStatus}</span>
                            </div>
                        </div>
                        
                        <div class="last-update">
                            Ultima atualizacao: ${getRelativeTime(station.lastUpdate)}
                        </div>
                        
                        <div class="card-actions">
                            <button class="btn-gasoline" onclick="reportFuel(${station.id}, 'gasoline', 'available')">
                               Clique para Marcar Gasolina Disponivel
                            </button>
                            <button class="btn-gasoline" onclick="reportFuel(${station.id}, 'gasoline', 'unavailable')">
                                Clique para Marcar Gasolina Indisponivel
                            </button>
                        </div>
                        <div class="card-actions">
                            <button class="btn-diesel" onclick="reportFuel(${station.id}, 'diesel', 'available')">
                               Clique para Marcar Diesel Disponivel
                            </button>
                            <button class="btn-diesel" onclick="reportFuel(${station.id}, 'diesel', 'unavailable')">
                               Clique para Marcar Diesel Indisponivel
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function reportFuel(stationId, fuelType, status) {
            try {
                const response = await fetch(`${API_URL}/stations/${stationId}/report-fuel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fuelType, status })
                });
                
                if (response.ok) {
                    await fetchStations();
                    const fuelName = fuelType === 'gasoline' ? 'Gasolina' : 'Diesel';
                    const statusText = status === 'available' ? 'Disponivel' : 'Indisponivel';
                    showNotification(`${fuelName} marcado como ${statusText}!`, 'success');
                } else {
                    showNotification('Erro ao atualizar', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Erro de conexao', 'error');
            }
        }

        async function addStation(event) {
            event.preventDefault();
            
            const name = document.getElementById('stationName').value;
            const location = document.getElementById('stationLocation').value;
            const gasoline = document.getElementById('gasolineStatus').value;
            const diesel = document.getElementById('dieselStatus').value;
            
            try {
                const response = await fetch(`${API_URL}/stations`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, location, gasoline, diesel })
                });
                
                if (response.ok) {
                    await fetchStations();
                    closeAddModal();
                    document.getElementById('addStationForm').reset();
                    showNotification('Posto adicionado!', 'success');
                } else {
                    showNotification('Erro ao adicionar', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Erro de conexao', 'error');
            }
        }

        function filterStations(filter) {
            currentFilter = filter;
            document.querySelectorAll('.btn-filter').forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderStations();
        }

        function selectFuelType(type) {
            currentFuelType = type;
            document.querySelectorAll('.fuel-btn').forEach(btn => {
                if (btn.dataset.fuel === type) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            renderStations();
        }

        function openAddModal() {
            document.getElementById('addModal').style.display = 'flex';
        }
        
        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
        }
        
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'success' ? '#16a34a' : '#dc2626'};
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                z-index: 1001;
                animation: slideIn 0.3s ease;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
        
        document.getElementById('addStationForm').addEventListener('submit', addStation);
        
        window.onclick = function(event) {
            const modal = document.getElementById('addModal');
            if (event.target === modal) {
                closeAddModal();
            }
        }
        
        fetchStations();
        setInterval(fetchStations, 120000);
    </script>
</body>
</html>
